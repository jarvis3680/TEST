                  <label>單位</label>

<div class="adm-modal-footer">

<script src="../../assets/js/main.js"></script>
<script>
var _URLS={"dash": "../dash.html", "query2": "../query.html", "detail": "../firm-detail.html", "cases": "../cases.html", "case-detail": "../case-detail.html", "industry": "../industry.html", "tech": "../tech.html", "audit": "../audit.html", "adm-users": "users.html", "settings": "settings.html", "adm-firm": "firm.html", "adm-industry": "industry.html", "adm-tech": "tech.html", "adm-case": "cases.html", "orgmgr": "../orgmgr.html"};
window.showPage=function(id,btn,state){
  if(id==='detail'&&state&&state.firmId){
    location.href=_URLS['detail']+'?firmId='+encodeURIComponent(state.firmId);return;
  }
  if(_URLS[id])location.href=_URLS[id];
};
window.goView=function(t){location.href=_URLS[t||'dash'];};
document.addEventListener('DOMContentLoaded',function(){
  // sidebar active 由 shell-loader.js 處理
  try{uaRenderTable();}catch(e){console.warn("uaRenderTable",e);}
  
});

// 管理模組 JS 載入確認
(function() {
  var MAX_WAIT = 5000; // 最多等 5 秒
  var CHECK_FN = 'uaRenderTable';
  var JS_FILES = ["../../assets/js/industry.js", "../../assets/js/tech.js", "../../assets/js/main.js"];
  
  function checkAndLoad() {
    if (typeof window[CHECK_FN] === 'function') return; // 已載入
    
    // 動態重新載入 JS 檔案
    function loadJS(src, cb) {
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.src = src;
      s.onload = cb;
      s.onerror = cb;
      document.head.appendChild(s);
    }
    
    var idx = 0;
    function loadNext() {
      if (idx >= JS_FILES.length) {
        if (typeof window[CHECK_FN] !== 'function') {
          console.error('[管理模組] 載入失敗：' + CHECK_FN + ' 仍未定義');
        }
        return;
      }
      loadJS(JS_FILES[idx++], loadNext);
    }
    loadNext();
  }
  
  // 頁面完全載入後再檢查
  if (document.readyState === 'complete') {
    setTimeout(checkAndLoad, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(checkAndLoad, 100); });
  }
})();

</script>

<script>
// ══ Shell Loader ══
// 動態載入 sidebar + topbar，保持 shell.html 單一來源

(function() {
  function loadShell() {
    var root = document.body.getAttribute('data-root') || '../';
    var shellUrl = root + 'assets/html/shell.html';

    fetch(shellUrl)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(shellHtml) {
        // 修正 shell 裡的相對路徑
        // 把 '../app/dash.html' 換成正確的 root + 'app/dash.html'
        shellHtml = shellHtml
          .replace(/\.\.\/app\/dash\.html/g, root + 'app/dash.html')
          .replace(/\.\.\/index\.html/g, root + 'index.html');

        // 建立 shell 結構（補上 .main 和 .shell 的關閉標籤）
        var wrapper = document.createElement('div');
        wrapper.innerHTML = shellHtml + '</div></div>';
        var shellEl = wrapper.firstElementChild; // <div class="shell">
        var mainEl  = shellEl.querySelector('.main');

        // 把 body 下的 .content 移進 .main
        var contentEl = document.body.querySelector('.content');
        if (contentEl && mainEl) {
          mainEl.appendChild(contentEl);
        }

        // inject shell 到 body 最前面
        document.body.insertBefore(shellEl, document.body.firstChild);

        // sidebar active
        var navPage = document.body.getAttribute('data-nav-page');
        if (navPage) {
          shellEl.querySelectorAll('.side-link').forEach(function(el) {
            el.classList.remove('active');
          });
          var activeEl = shellEl.querySelector('.side-link[data-page="' + navPage + '"]');
          if (activeEl) activeEl.classList.add('active');
        }

        // 麵包屑
        var crumbEl = document.getElementById('topbar-crumb');
        if (crumbEl) {
          crumbEl.textContent = document.body.getAttribute('data-crumb') || '';
        }

        // 觸發完成事件（讓各頁面的初始化可以等 shell 完成）
        document.dispatchEvent(new CustomEvent('shell-loaded', {detail:{root:root}}));
      })
      .catch(function(e) {
        console.error('[Shell Loader] 載入失敗:', shellUrl, e);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadShell);
  } else {
    loadShell();
  }
})();

</script>
