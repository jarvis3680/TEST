<script>
/* ── 手機側邊欄 Toggle ── */
function sideToggle(){
  var side=document.querySelector('.side');
  var overlay=document.getElementById('sideOverlay');
  var btn=document.getElementById('topHamburger');
  var open=side.classList.toggle('side-open');
  overlay.classList.toggle('active',open);
  btn.classList.toggle('is-open',open);
  document.body.style.overflow=open?'hidden':'';
}
function sideClose(){
  var side=document.querySelector('.side');
  var overlay=document.getElementById('sideOverlay');
  var btn=document.getElementById('topHamburger');
  side.classList.remove('side-open');
  overlay.classList.remove('active');
  btn.classList.remove('is-open');
  document.body.style.overflow='';
}
/* 切換頁面後關閉側邊欄 */
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.side-link').forEach(function(el){
    el.addEventListener('click',function(){
      if(window.innerWidth<1024) sideClose();
    });
  });
});
</script>
